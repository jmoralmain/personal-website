<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jeffrey Morales</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="contact-shadow"></div>
  <canvas id="globe"></canvas>

  <!-- Top bar: wordmark + location label (names the region in view) -->
  <header id="topnav">
    <span class="brand">Jeffrey Morales</span>
    <span id="coords"></span>
  </header>

  <!-- Intro overlay (editorial hero, fades on first interaction) -->
  <div id="intro">
    <h1 class="intro-name">Jeffrey Morales</h1>
    <p class="intro-sub">Drag to look around &mdash; or jump to a region</p>
  </div>

  <!-- Zoom back out — appears when descended into a region; floats independently -->
  <button id="orbit-btn">↑ Back to globe</button>

  <!-- Region jump bar: buttons are generated from the manifest (ui/regionNav.js) -->
  <nav id="region-bar" aria-label="Jump to region">
    <div id="region-nav"></div>
  </nav>

  <!-- Info panel that appears when a node is clicked -->
  <div id="panel" class="hidden">
    <button id="panel-close">&times;</button>
    <div id="panel-icon"></div>
    <h2 id="panel-title"></h2>
    <p id="panel-body"></p>
  </div>

  <!-- Node label tooltip -->
  <div id="tooltip"></div>

  <!-- Full-screen photo lightbox -->
  <div id="lightbox" class="hidden">
    <button id="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" alt="" />
    <div id="lightbox-caption"></div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
