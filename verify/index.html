<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify — Portfolio</title>
  <style>
    :root {
      --bg:       #050510;
      --surface:  #0e0e24;
      --border:   rgba(123, 97, 255, 0.2);
      --text:     #e8e8f0;
      --dim:      rgba(232,232,240,0.5);
      --pass:     #4ade80;
      --fail:     #ff5d5d;
      --warn:     #ffb84d;
      --info:     #7b61ff;
      --accent:   #7b61ff;
      --accent-2: #00d4ff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', 'Fira Code', ui-monospace, monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 2rem;
      min-height: 100vh;
    }
    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 0.3rem;
    }
    .subtitle {
      color: var(--dim);
      font-size: 0.8rem;
      margin-bottom: 2rem;
      letter-spacing: 0.05em;
    }
    #summary {
      display: flex;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding: 1rem 1.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
    }
    .stat { display: flex; flex-direction: column; align-items: center; gap: 0.15rem; }
    .stat-value { font-size: 1.6rem; font-weight: 700; }
    .stat-label { font-size: 0.7rem; color: var(--dim); letter-spacing: 0.08em; text-transform: uppercase; }
    .stat-pass  .stat-value { color: var(--pass); }
    .stat-fail  .stat-value { color: var(--fail); }
    .stat-warn  .stat-value { color: var(--warn); }
    .stat-info  .stat-value { color: var(--info); }
    .overall {
      margin-left: auto;
      align-self: center;
      padding: 0.4rem 1rem;
      border-radius: 6px;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
    }
    .overall.all-passed { background: rgba(74,222,128,0.15); color: var(--pass); border: 1px solid var(--pass); }
    .overall.has-failed  { background: rgba(255,93,93,0.15);  color: var(--fail); border: 1px solid var(--fail); }
    .suite {
      margin-bottom: 1.5rem;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .suite-header {
      padding: 0.6rem 1rem;
      background: var(--surface);
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .suite-badge {
      font-size: 0.7rem;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-weight: 600;
    }
    .badge-pass { background: rgba(74,222,128,0.15); color: var(--pass); }
    .badge-fail { background: rgba(255,93,93,0.15);  color: var(--fail); }
    .badge-warn { background: rgba(255,184,77,0.15); color: var(--warn); }
    table { width: 100%; border-collapse: collapse; }
    tr { border-top: 1px solid var(--border); }
    tr:first-child { border-top: none; }
    td { padding: 0.45rem 1rem; vertical-align: top; }
    .icon { width: 1.8rem; font-size: 0.9rem; }
    .label { color: var(--text); }
    .detail { color: var(--dim); font-size: 0.78rem; padding-top: 0.15rem; }
    .row-pass  .icon::before { content: '✓'; color: var(--pass); }
    .row-fail  .icon::before { content: '✗'; color: var(--fail); }
    .row-warn  .icon::before { content: '⚠'; color: var(--warn); }
    .row-info  .icon::before { content: '·'; color: var(--info); }
    #loading {
      color: var(--dim);
      font-size: 0.9rem;
      padding: 2rem 0;
    }
  </style>
</head>
<body>
  <h1>Portfolio — Verification</h1>
  <p class="subtitle">Run from a local server (python3 -m http.server 8080) &nbsp;·&nbsp; <span id="ts"></span></p>

  <!--
    The app's DOM elements must exist for the env check (DOM id assertions)
    and the scene check (panel.js/tooltip.js grab elements at module load).
    They are hidden — only the verify UI is visible.
  -->
  <div style="display:none">
    <canvas id="globe"></canvas>
    <div id="intro"></div>
    <div id="panel">
      <button id="panel-close"></button>
      <div id="panel-icon"></div>
      <h2 id="panel-title"></h2>
      <p id="panel-body"></p>
    </div>
    <div id="tooltip"></div>
  </div>

  <div id="summary"><span id="loading">Running checks…</span></div>
  <div id="output"></div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.165.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.165.0/examples/jsm/"
    }
  }
  </script>
  <script type="module">
    import { runAll, summarise } from './runner.js';

    document.getElementById('ts').textContent = new Date().toLocaleString();

    const suiteResults = await runAll();
    const { passed, failed, warned, info, allPassed } = summarise(suiteResults);

    // ── Summary bar ──────────────────────────────────────────────────────────
    const summaryEl = document.getElementById('summary');
    summaryEl.innerHTML = `
      <div class="stat stat-pass">
        <span class="stat-value">${passed}</span>
        <span class="stat-label">Passed</span>
      </div>
      <div class="stat stat-fail">
        <span class="stat-value">${failed}</span>
        <span class="stat-label">Failed</span>
      </div>
      <div class="stat stat-warn">
        <span class="stat-value">${warned}</span>
        <span class="stat-label">Warnings</span>
      </div>
      <div class="stat stat-info">
        <span class="stat-value">${info}</span>
        <span class="stat-label">Info</span>
      </div>
      <div class="overall ${allPassed ? 'all-passed' : 'has-failed'}">
        ${allPassed ? '✓ ALL CHECKS PASSED' : '✗ FAILURES DETECTED'}
      </div>
    `;

    // ── Per-suite results ────────────────────────────────────────────────────
    const outputEl = document.getElementById('output');
    suiteResults.forEach(({ name, results }) => {
      const suiteFailed  = results.filter(r => r.passed === false && r.severity !== 'warn').length;
      const suiteWarned  = results.filter(r => r.passed === false && r.severity === 'warn').length;
      const badgeClass   = suiteFailed ? 'badge-fail' : suiteWarned ? 'badge-warn' : 'badge-pass';
      const badgeText    = suiteFailed ? `${suiteFailed} failed`
                         : suiteWarned ? `${suiteWarned} warnings`
                         : 'all passed';

      const rows = results.map(r => {
        const rowClass = r.passed === true ? 'row-pass'
                       : r.passed === false && r.severity === 'warn' ? 'row-warn'
                       : r.passed === false ? 'row-fail'
                       : 'row-info';
        const detail = r.detail
          ? `<div class="detail">${escHtml(r.detail)}</div>` : '';
        return `
          <tr class="${rowClass}">
            <td class="icon"></td>
            <td class="label">${escHtml(r.label)}${detail}</td>
          </tr>`;
      }).join('');

      outputEl.insertAdjacentHTML('beforeend', `
        <div class="suite">
          <div class="suite-header">
            ${escHtml(name)}
            <span class="suite-badge ${badgeClass}">${badgeText}</span>
          </div>
          <table>${rows}</table>
        </div>`);
    });

    function escHtml(s) {
      return String(s)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
